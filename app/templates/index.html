<!DOCTYPE html>
<html>
<head>
    <title>Student Registration & Feedback</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #9face6);
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
        }

        input, select, textarea {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
            height: 70px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            width: 95%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .entry {
            background: #f2f2f2;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            text-align: left;
        }

        .feedback-section {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Registration & Feedback</h2>

    <form method="POST">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="text" name="student_id" placeholder="Student ID" required>

        <input type="email" name="email" placeholder="Email" required>

        <select name="course" required>
            <option value="">Select Course</option>
            <option>Computer Science</option>
            <option>Data Science</option>
            <option>AI & ML</option>
        </select>

        <textarea name="message" placeholder="Enter Feedback" required></textarea>

        <button type="submit">Submit</button>

    </form>

    <div class="feedback-section">
        <h3>Submitted Feedback</h3>

        {% for row in data %}
        <div class="entry">
            <b>{{row[0]}}</b> ({{row[1]}})<br>
            {{row[2]}} | {{row[3]}}<br>
            {{row[4]}}
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
